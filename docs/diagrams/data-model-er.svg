<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="930" viewBox="0 0 1700 930" role="img" aria-label="Data Model">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#4D96FF" />
  </marker>
  <style>
    .title { font: 700 26px Arial, Helvetica, sans-serif; fill: #2D3436; }
    .panel-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #2D3436; }
    .box-text { font: 600 15px Arial, Helvetica, sans-serif; fill: #2D3436; }
    .small-text { font: 600 13px Arial, Helvetica, sans-serif; fill: #586267; }
    .edge-label { font: 600 12px Arial, Helvetica, sans-serif; fill: #586267; }
    .arrow { fill: none; stroke: #4D96FF; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
    .arrow-soft { fill: none; stroke: #4D96FF; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); stroke-dasharray: 8 6; }
    .relation { fill: none; stroke: #4D96FF; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</defs>
<rect x="0" y="0" width="1700" height="930" fill="#FFFFFF"/>
