<text x="436" y="222" class="small">id PK</text>
<text x="436" y="248" class="small">userId FK</text>
<text x="436" y="274" class="small">name / templateId</text>
<text x="436" y="300" class="small">stationCount</text>
<text x="436" y="326" class="small">createdAt / updatedAt</text>
<rect x="780" y="130" width="250" height="204" rx="16" fill="#FFFFFF" stroke="#6BCB77" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="780" y="130" width="250" height="44" rx="16" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2.5"/>
<text x="905.0" y="158" text-anchor="middle" class="box-title">STATION</text>
<text x="796" y="202" class="small">id PK</text>
<text x="796" y="228" class="small">palaceId FK</text>
<text x="796" y="254" class="small">userId FK</text>
<text x="796" y="280" class="small">order / emoji / label</text>
<text x="796" y="306" class="small">memoryText</text>
<text x="796" y="332" class="small">imageUri</text>
