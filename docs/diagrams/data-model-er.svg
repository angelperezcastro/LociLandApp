<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-label="Database / Entity Relationship Diagram"><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L12,6 L0,12 z" fill="#4C617A" /></marker><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#12253f" flood-opacity="0.08"/></filter></defs><rect width="100%" height="100%" fill="#FFFFFF"/><text x="800.0" y="46" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#203040">Database / Entity Relationship Diagram</text><rect x="120" y="120" width="250" height="132" rx="14" fill="#FFFFFF" stroke="#E9C351" stroke-width="2" filter="url(#shadow)"/><text x="245.0" y="148" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#324154"><tspan x="245.0" dy="0">User Profile</tspan></text><text x="245.0" y="180" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#607086"><tspan x="245.0" dy="0">users/{uid}</tspan><tspan x="245.0" dy="16">displayName / email</tspan><tspan x="245.0" dy="16">avatarEmoji / ageGroup</tspan><tspan x="245.0" dy="16">xp / level / streak</tspan></text><rect x="490" y="120" width="230" height="118" rx="14" fill="#FFFFFF" stroke="#6AA5FF" stroke-width="2" filter="url(#shadow)"/><text x="605.0" y="148" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#324154"><tspan x="605.0" dy="0">Palace</tspan></text><text x="605.0" y="180" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#607086"><tspan x="605.0" dy="0">users/{uid}/palaces/{palaceId}</tspan><tspan x="605.0" dy="16">name / templateId</tspan><tspan x="605.0" dy="16">stationCount</tspan></text><rect x="850" y="120" width="250" height="136" rx="14" fill="#FFFFFF" stroke="#68B984" stroke-width="2" filter="url(#shadow)"/><text x="975.0" y="148" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#324154"><tspan x="975.0" dy="0">Station</tspan></text><text x="975.0" y="180" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#607086"><tspan x="975.0" dy="0">users/{uid}/palaces/{palaceId}/stations/{stationId}</tspan><tspan x="975.0" dy="16">order / emoji / label</tspan><tspan x="975.0" dy="16">memoryText / imageUri</tspan></text><rect x="490" y="350" width="260" height="150" rx="14" fill="#FFFFFF" stroke="#9A7BFF" stroke-width="2" filter="url(#shadow)"/><text x="620.0" y="378" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#324154"><tspan x="620.0" dy="0">Review Session</tspan></text><text x="620.0" y="410" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#607086"><tspan x="620.0" dy="0">users/{uid}/reviewSessions/{sessionId}</tspan><tspan x="620.0" dy="16">startedAt / completedAt</tspan><tspan x="620.0" dy="16">correct / incorrect</tspan><tspan x="620.0" dy="16">score / xpEarned</tspan></text><rect x="880" y="380" width="230" height="106" rx="14" fill="#FFFFFF" stroke="#52C7D5" stroke-width="2" filter="url(#shadow)"/><text x="995.0" y="408" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#324154"><tspan x="995.0" dy="0">Review Answer</tspan></text><text x="995.0" y="440" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#607086"><tspan x="995.0" dy="0">answers/{answerId}</tspan><tspan x="995.0" dy="16">stationId / correct</tspan><tspan x="995.0" dy="16">answeredAt</tspan></text><rect x="120" y="350" width="230" height="134" rx="14" fill="#FFFFFF" stroke="#EE7B7B" stroke-width="2" filter="url(#shadow)"/><text x="235.0" y="378" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#324154"><tspan x="235.0" dy="0">XP Event</tspan></text><text x="235.0" y="410" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#607086"><tspan x="235.0" dy="0">users/{uid}/xpEvents/{eventId}</tspan><tspan x="235.0" dy="16">reason / amount</tspan><tspan x="235.0" dy="16">previousXP / newXP</tspan><tspan x="235.0" dy="16">metadata</tspan></text><rect x="120" y="595" width="230" height="122" rx="14" fill="#FFFFFF" stroke="#F6AE5D" stroke-width="2" filter="url(#shadow)"/><text x="235.0" y="623" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#324154"><tspan x="235.0" dy="0">Achievement</tspan></text><text x="235.0" y="655" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#607086"><tspan x="235.0" dy="0">users/{uid}/achievements/{achievementId}</tspan><tspan x="235.0" dy="16">title / xpReward</tspan><tspan x="235.0" dy="16">earnedAt</tspan></text><rect x="490" y="595" width="280" height="138" rx="14" fill="#FFFFFF" stroke="#E9C351" stroke-width="2" filter="url(#shadow)"/><text x="630.0" y="623" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#324154"><tspan x="630.0" dy="0">Stats Summary</tspan></text><text x="630.0" y="655" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#607086"><tspan x="630.0" dy="0">users/{uid}/statsSummary</tspan><tspan x="630.0" dy="16">totalPalaces / totalStations</tspan><tspan x="630.0" dy="16">totalReviewSessions</tspan><tspan x="630.0" dy="16">reviewDateStrings</tspan></text><line x1="370" y1="180" x2="490" y2="180" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/><text x="430.0" y="172.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#607086">owns</text><line x1="720" y1="180" x2="850" y2="188" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/><text x="785.0" y="176.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#607086">contains</text><line x1="605" y1="238" x2="605" y2="350" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/><text x="605.0" y="286.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#607086">used in reviews</text><line x1="750" y1="428" x2="880" y2="428" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/><text x="815.0" y="420.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#607086">records</text><line x1="245" y1="252" x2="245" y2="350" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/><text x="245.0" y="293.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#607086">earns XP</text><line x1="245" y1="484" x2="245" y2="595" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/><text x="245.0" y="531.5" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#607086">can unlock</text><path d="M 320 420 L 405 420 L 405 664 L 490 664" fill="none" stroke="#4C617A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="405.0" y="534.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#607086">updates aggregates</text><path d="M 620 500 L 620 555 L 630 555 L 630 595" fill="none" stroke="#4C617A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="625.0" y="547.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#607086">summarises</text><path d="M 245 717 L 245 760 L 630 760 L 630 733" fill="none" stroke="#4C617A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="437.5" y="752.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#607086">contributes to progress</text><rect x="1180" y="120" width="320" height="280" rx="20" fill="#F7F9FC" stroke="#B8C3D0" stroke-width="2"/><rect x="1198" y="102" width="298" height="36" rx="14" fill="#FFFFFF" stroke="#B8C3D0" stroke-width="2"/><text x="1347.0" y="126" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154">Firestore collection hierarchy</text><text x="1340" y="175" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#324154"><tspan x="1340" dy="0">users/{uid}</tspan><tspan x="1340" dy="24">├─ palaces/{palaceId}</tspan><tspan x="1340" dy="24">│  └─ stations/{stationId}</tspan><tspan x="1340" dy="24">├─ reviewSessions/{sessionId}</tspan><tspan x="1340" dy="24">│  └─ answers/{answerId}</tspan><tspan x="1340" dy="24">├─ achievements/{achievementId}</tspan><tspan x="1340" dy="24">├─ xpEvents/{eventId}</tspan><tspan x="1340" dy="24">└─ statsSummary</tspan></text><rect x="110" y="835" width="1380" height="54" rx="14" fill="#F8FAFC" stroke="#D7E0EA" stroke-width="1.5"/><text x="800.0" y="859" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" fill="#607086"><tspan x="800.0" dy="0">This diagram focuses on logical ownership and data flow. All collections are user-scoped in Firestore; stations belong to palaces, review sessions record answers, and progression is reflected in XP events, achievements and aggregated stats.</tspan></text></svg>