<rect x="420" y="520" width="270" height="44" rx="16" fill="#FFF1C2" stroke="#FFB703" stroke-width="2.5"/>
<text x="555.0" y="548" text-anchor="middle" class="box-title">REVIEW_SESSION</text>
<text x="436" y="592" class="small">id PK</text>
<text x="436" y="618" class="small">palaceId FK / userId FK</text>
<text x="436" y="644" class="small">startedAt / completedAt</text>
<text x="436" y="670" class="small">totalStations</text>
<text x="436" y="696" class="small">correct / incorrect</text>
<text x="436" y="722" class="small">xpEarned / isPerfect</text>
<text x="436" y="748" class="small">status</text>
<rect x="780" y="555" width="250" height="152" rx="16" fill="#FFFFFF" stroke="#7F5AD8" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="780" y="555" width="250" height="44" rx="16" fill="#F1E8FF" stroke="#7F5AD8" stroke-width="2.5"/>
<text x="905.0" y="583" text-anchor="middle" class="box-title">REVIEW_ANSWER</text>
<text x="796" y="627" class="small">stationId PK</text>
<text x="796" y="653" class="small">sessionId FK</text>
<text x="796" y="679" class="small">correct</text>
<text x="796" y="705" class="small">answeredAt</text>
<rect x="1150" y="140" width="260" height="178" rx="16" fill="#FFFFFF" stroke="#FF6B6B" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="1150" y="140" width="260" height="44" rx="16" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="2.5"/>
<text x="1280.0" y="168" text-anchor="middle" class="box-title">XP_EVENT</text>
<text x="1166" y="212" class="small">eventId PK</text>
<text x="1166" y="238" class="small">reason / amount</text>
<text x="1166" y="264" class="small">previousXP / newXP</text>
<text x="1166" y="290" class="small">previousLevel / newLevel</text>
<text x="1166" y="316" class="small">metadata</text>
<rect x="1150" y="430" width="260" height="178" rx="16" fill="#FFFFFF" stroke="#6BCB77" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="1150" y="430" width="260" height="44" rx="16" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2.5"/>
<text x="1280.0" y="458" text-anchor="middle" class="box-title">ACHIEVEMENT</text>
<text x="1166" y="502" class="small">achievementId PK</text>
<text x="1166" y="528" class="small">title / description</text>
<text x="1166" y="554" class="small">emoji / xpReward</text>
<text x="1166" y="580" class="small">earnedAt</text>
<text x="1166" y="606" class="small">triggerType</text>
<rect x="1150" y="700" width="260" height="204" rx="16" fill="#FFFFFF" stroke="#4D96FF" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="1150" y="700" width="260" height="44" rx="16" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2.5"/>
<text x="1280.0" y="728" text-anchor="middle" class="box-title">STATS_SUMMARY</text>
<text x="1166" y="772" class="small">totalPalaces</text>
<text x="1166" y="798" class="small">totalStations</text>
<text x="1166" y="824" class="small">reviews / perfectReviews</text>
<text x="1166" y="850" class="small">correct / incorrect</text>
<text x="1166" y="876" class="small">usedTemplateIds</text>
<text x="1166" y="902" class="small">fastestReviewSeconds</text>
<path d="M310,229.0 C365.0,229.0 365.0,239.0 420,239.0" class="arrow"/>
<text x="365.0" y="226.0" text-anchor="middle" class="tiny">owns</text>
<path d="M650,239.0 C715.0,239.0 715.0,232.0 780,232.0" class="arrow-green"/>
<text x="715.0" y="227.5" text-anchor="middle" class="tiny">contains</text>
<path d="M650,239.0 C535.0,239.0 535.0,635.0 420,635.0" class="arrow"/>
<text x="535.0" y="429.0" text-anchor="middle" class="tiny">has</text>
<path d="M690,635.0 C735.0,635.0 735.0,631.0 780,631.0" class="arrow-green"/>
<text x="735.0" y="625.0" text-anchor="middle" class="tiny">records</text>
<path d="M310,229.0 C730.0,229.0 730.0,229.0 1150,229.0" class="arrow-red"/>
<text x="730.0" y="221.0" text-anchor="middle" class="tiny">records</text>
<path d="M310,229.0 C730.0,229.0 730.0,519.0 1150,519.0" class="arrow-green"/>
<text x="730.0" y="366.0" text-anchor="middle" class="tiny">unlocks</text>
<path d="M310,229.0 C730.0,229.0 730.0,802.0 1150,802.0" class="arrow"/>
<text x="730.0" y="507.5" text-anchor="middle" class="tiny">aggregates</text>
<text x="60" y="925" class="small">Firestore shape: users/{uid}/palaces/{palaceId}/stations, reviewSessions, answers, xpEvents, achievements and stats/summary.</text>
</svg>