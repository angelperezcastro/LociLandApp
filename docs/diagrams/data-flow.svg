<svg xmlns="http://www.w3.org/2000/svg" width="1350" height="780" viewBox="0 0 1350 780" role="img" aria-label="Data Flow">
<rect width="1350" height="780" fill="#FFFFFF"/>

<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#2D3436" flood-opacity="0.10"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#4D96FF" />
  </marker>
  <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#6BCB77" />
  </marker>
  <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#FF6B6B" />
  </marker>
</defs>


<style>
  .title { font-family: Inter, Nunito, Arial, sans-serif; font-size: 30px; font-weight: 800; fill: #2D3436; }
  .subtitle { font-family: Inter, Nunito, Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #586267; }
  .group-title { font-family: Inter, Nunito, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #2D3436; }
  .box-title { font-family: Inter, Nunito, Arial, sans-serif; font-size: 15px; font-weight: 800; fill: #2D3436; }
  .box-text { font-family: Inter, Nunito, Arial, sans-serif; font-size: 12px; font-weight: 600; fill: #586267; }
  .small { font-family: Inter, Nunito, Arial, sans-serif; font-size: 11px; font-weight: 600; fill: #586267; }
  .tiny { font-family: Inter, Nunito, Arial, sans-serif; font-size: 10px; font-weight: 600; fill: #586267; }
  .arrow { stroke: #4D96FF; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  .arrow-green { stroke: #6BCB77; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
  .arrow-red { stroke: #FF6B6B; stroke-width: 2.4; fill: none; marker-end: url(#arrowRed); }
  .dash { stroke-dasharray: 7 5; }
</style>

<rect x="12" y="12" width="1326" height="756" rx="28" fill="#FFFFFF" stroke="#E9DFC7" stroke-width="2"/>
<text x="42" y="58" class="title">Data Flow</text>
<text x="42" y="85" class="subtitle">Typed UI actions move through Zustand, services, Firebase Rules and persisted data</text>
<rect x="20" y="130" width="140" height="52" rx="10" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<text x="90.0" y="157" text-anchor="middle" class="small">Child User</text>
<line x1="90" y1="182" x2="90" y2="700" stroke="#E9DFC7" stroke-width="2"/>
<rect x="220" y="130" width="140" height="52" rx="10" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<text x="290.0" y="157" text-anchor="middle" class="small">React Native</text>
<text x="290.0" y="174" text-anchor="middle" class="small">Screen</text>
<line x1="290" y1="182" x2="290" y2="700" stroke="#E9DFC7" stroke-width="2"/>
<rect x="430" y="130" width="140" height="52" rx="10" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2" filter="url(#shadow)"/>
<text x="500.0" y="157" text-anchor="middle" class="small">Zustand Store</text>
<line x1="500" y1="182" x2="500" y2="700" stroke="#E9DFC7" stroke-width="2"/>
<rect x="630" y="130" width="140" height="52" rx="10" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2" filter="url(#shadow)"/>
<text x="700.0" y="157" text-anchor="middle" class="small">Service Layer</text>
<line x1="700" y1="182" x2="700" y2="700" stroke="#E9DFC7" stroke-width="2"/>
<rect x="830" y="130" width="140" height="52" rx="10" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2" filter="url(#shadow)"/>
<text x="900.0" y="157" text-anchor="middle" class="small">Firebase Rules</text>
<line x1="900" y1="182" x2="900" y2="700" stroke="#E9DFC7" stroke-width="2"/>
<rect x="1030" y="130" width="140" height="52" rx="10" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2" filter="url(#shadow)"/>
<text x="1100.0" y="157" text-anchor="middle" class="small">Firestore</text>
<line x1="1100" y1="182" x2="1100" y2="700" stroke="#E9DFC7" stroke-width="2"/>
<rect x="1190" y="130" width="140" height="52" rx="10" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2" filter="url(#shadow)"/>
<text x="1260.0" y="157" text-anchor="middle" class="small">Storage</text>
<line x1="1260" y1="182" x2="1260" y2="700" stroke="#E9DFC7" stroke-width="2"/>
<line x1="90" y1="230" x2="290" y2="230" class="arrow"/>
<text x="190.0" y="220" text-anchor="middle" class="tiny">Create palace / station / review</text>
<line x1="290" y1="300" x2="500" y2="300" class="arrow"/>
<text x="395.0" y="290" text-anchor="middle" class="tiny">Dispatch typed action</text>
<line x1="500" y1="370" x2="700" y2="370" class="arrow"/>
<text x="600.0" y="360" text-anchor="middle" class="tiny">Call domain service</text>
<line x1="700" y1="440" x2="900" y2="440" class="arrow"/>
<text x="800.0" y="430" text-anchor="middle" class="tiny">Request read/write</text>
<line x1="900" y1="510" x2="1100" y2="510" class="arrow"/>
<text x="1000.0" y="500" text-anchor="middle" class="tiny">Allow valid user-scoped data</text>
<line x1="1100" y1="580" x2="700" y2="580" class="arrow-green dash"/>
<text x="900.0" y="570" text-anchor="middle" class="tiny">Persisted document</text>
<line x1="700" y1="630" x2="500" y2="630" class="arrow-green dash"/>
<text x="600.0" y="620" text-anchor="middle" class="tiny">Typed result</text>
<line x1="500" y1="675" x2="290" y2="675" class="arrow-green dash"/>
<text x="395.0" y="665" text-anchor="middle" class="tiny">Updated state</text>
<rect x="660" y="215" width="630" height="90" rx="18" fill="#FFFFFF" stroke="#FFB703" stroke-width="2" stroke-dasharray="8 6"/>
<text x="685" y="245" class="box-title">Station image selected</text>
<line x1="700" y1="270" x2="900" y2="270" class="arrow"/>
<line x1="900" y1="270" x2="1260" y2="270" class="arrow"/>
<line x1="1260" y1="295" x2="1100" y2="295" class="arrow-green dash"/>
<text x="970" y="295" class="tiny">Validate owner, path, file type and size</text>
</svg>