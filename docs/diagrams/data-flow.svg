</text>
<line x1="1130" y1="160" x2="1130" y2="685" stroke="#DCE3EA" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6 8"/>
<rect x="1260" y="100" width="150" height="52" rx="16" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2" filter="url(#shadow)"/>
