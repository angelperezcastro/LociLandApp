<rect x="440" y="100" width="150" height="52" rx="16" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<text x="515.0" y="124.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2D3436">
<tspan x="515.0" dy="0">Zustand Store</tspan>
</text>
<line x1="515" y1="160" x2="515" y2="685" stroke="#DCE3EA" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6 8"/>
<rect x="645" y="100" width="150" height="52" rx="16" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<text x="720.0" y="124.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2D3436">
<tspan x="720.0" dy="0">Service Layer</tspan>
</text>
