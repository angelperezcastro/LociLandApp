<text x="207.5" y="210" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="207.5" dy="0">create palace / station /</tspan>
<tspan x="207.5" dy="18">review</tspan>
</text>
<line x1="310" y1="285" x2="515" y2="285" stroke="#48606A" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="412.5" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="412.5" dy="0">dispatch typed action</tspan>
</text>
<line x1="515" y1="350" x2="720" y2="350" stroke="#48606A" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="617.5" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="617.5" dy="0">call domain service</tspan>
</text>
<line x1="720" y1="415" x2="925" y2="415" stroke="#48606A" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="822.5" y="405" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="822.5" dy="0">request read/write</tspan>
</text>
<line x1="925" y1="480" x2="1130" y2="480" stroke="#4D96FF" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="1027.5" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="1027.5" dy="0">allow owner-scoped valid</tspan>
<tspan x="1027.5" dy="18">data</tspan>
</text>
<line x1="1130" y1="545" x2="720" y2="545" stroke="#48606A" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
<text x="925.0" y="535" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="925.0" dy="0">persisted document /</tspan>
<tspan x="925.0" dy="18">typed result</tspan>
</text>
<line x1="720" y1="610" x2="515" y2="610" stroke="#48606A" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
<text x="617.5" y="600" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="617.5" dy="0">update local state</tspan>
</text>
<line x1="515" y1="655" x2="310" y2="655" stroke="#48606A" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
<text x="412.5" y="645" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="412.5" dy="0">render fresh UI</tspan>
</text>
<rect x="690" y="635" width="650" height="80" rx="18" fill="#D8F9FB" stroke="#38C4CE" stroke-width="2"/>
<text x="715" y="662" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#2D3436">Optional station image branch</text>
<line x1="790" y1="682" x2="925" y2="682" stroke="#38C4CE" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="925" y1="682" x2="1335" y2="682" stroke="#38C4CE" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="1065" y="704" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="1065" dy="0">validate owner, file type, size and path</tspan>
</text>
</svg>