<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
<title id="title">Data Flow</title>
<desc id="desc">Professional architecture diagram for the LociLand README.</desc>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M 1 1 L 11 6 L 1 11 z" fill="#48606A" />
  </marker>
  <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M 1 1 L 11 6 L 1 11 z" fill="#4D96FF" />
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#2D3436" flood-opacity="0.10"/>
  </filter>
</defs>
<rect x="0" y="0" width="1440" height="760" fill="#FFFFFF"/>
<text x="720.0" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2D3436">Data Flow</text>
<line x1="50" y1="58" x2="1390" y2="58" stroke="#E9DFC7" stroke-width="2" stroke-linecap="round"/>
<rect x="30" y="100" width="150" height="52" rx="16" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<text x="105.0" y="124.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2D3436">
<tspan x="105.0" dy="0">Child User</tspan>
</text>
<line x1="105" y1="160" x2="105" y2="685" stroke="#DCE3EA" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6 8"/>
<rect x="235" y="100" width="150" height="52" rx="16" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<text x="310.0" y="124.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2D3436">
<tspan x="310.0" dy="0">Screen</tspan>
</text>
