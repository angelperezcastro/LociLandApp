<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="740" viewBox="0 0 1280 740" role="img" aria-labelledby="title desc">
<title id="title">Navigation Architecture</title>
<desc id="desc">Professional architecture diagram for the LociLand README.</desc>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M 1 1 L 11 6 L 1 11 z" fill="#48606A" />
  </marker>
  <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M 1 1 L 11 6 L 1 11 z" fill="#4D96FF" />
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
