<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="740" viewBox="0 0 1320 740" role="img" aria-labelledby="title desc">
<title id="title">Deployment and Runtime Architecture</title>
<desc id="desc">Professional architecture diagram for the LociLand README.</desc>
