<line x1="1045" y1="440" x2="1045" y2="475" class="arrow-green"/>
<path d="M345,410 C432.5,410 432.5,246 520,246" class="arrow"/>
<text x="398" y="308" class="tiny">deploy rules</text>
<path d="M345,410 C632.5,410 632.5,220 920,220" class="arrow-green"/>
