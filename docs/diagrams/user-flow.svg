<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="780" viewBox="0 0 1500 780" role="img" aria-label="Core User Journey">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#4C617A" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#12253f" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <text x="750.0" y="48" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#203040">Core User Journey</text>

  <rect x="45" y="120" width="250" height="500" rx="20" fill="#FFF8E1" stroke="#E9C351" stroke-width="2"/>
  <rect x="67" y="102" width="138" height="36" rx="14" fill="#FFFFFF" stroke="#E9C351" stroke-width="2"/>
  <text x="136.0" y="125" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154">1. First use</text>
<rect x="80" y="185" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#E9C351" stroke-width="2" filter="url(#shadow)"/>
<text x="170.0" y="223.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="170.0" dy="0">Open app</tspan></text>
<rect x="80" y="295" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#E9C351" stroke-width="2" filter="url(#shadow)"/>
<text x="170.0" y="333.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="170.0" dy="0">Complete onboarding</tspan></text>
<rect x="80" y="405" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#E9C351" stroke-width="2" filter="url(#shadow)"/>
<text x="170.0" y="443.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="170.0" dy="0">Create child profile</tspan></text>

  <rect x="337" y="120" width="250" height="500" rx="20" fill="#EAF3FF" stroke="#6AA5FF" stroke-width="2"/>
  <rect x="359" y="102" width="165" height="36" rx="14" fill="#FFFFFF" stroke="#6AA5FF" stroke-width="2"/>
  <text x="441.5" y="125" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154">2. Build palace</text>
<rect x="372" y="185" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#6AA5FF" stroke-width="2" filter="url(#shadow)"/>
<text x="462.0" y="223.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="462.0" dy="0">Choose template</tspan></text>
<rect x="372" y="295" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#6AA5FF" stroke-width="2" filter="url(#shadow)"/>
<text x="462.0" y="333.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="462.0" dy="0">Name memory world</tspan></text>
<rect x="372" y="405" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#6AA5FF" stroke-width="2" filter="url(#shadow)"/>
<text x="462.0" y="443.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="462.0" dy="0">Preview palace</tspan></text>

  <rect x="629" y="120" width="250" height="500" rx="20" fill="#EAF8EE" stroke="#68B984" stroke-width="2"/>
  <rect x="651" y="102" width="165" height="36" rx="14" fill="#FFFFFF" stroke="#68B984" stroke-width="2"/>
  <text x="733.5" y="125" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154">3. Add stations</text>
<rect x="664" y="185" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#68B984" stroke-width="2" filter="url(#shadow)"/>
<text x="754.0" y="223.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="754.0" dy="0">Create memory anchors</tspan></text>
<rect x="664" y="295" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#68B984" stroke-width="2" filter="url(#shadow)"/>
<text x="754.0" y="333.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="754.0" dy="0">Attach optional images</tspan></text>
<rect x="664" y="405" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#68B984" stroke-width="2" filter="url(#shadow)"/>
<text x="754.0" y="443.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="754.0" dy="0">Order the route</tspan></text>

  <rect x="921" y="120" width="250" height="500" rx="20" fill="#F1EDFF" stroke="#9A7BFF" stroke-width="2"/>
  <rect x="943" y="102" width="192" height="36" rx="14" fill="#FFFFFF" stroke="#9A7BFF" stroke-width="2"/>
  <text x="1039.0" y="125" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154">4. Practise recall</text>
<rect x="956" y="185" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#9A7BFF" stroke-width="2" filter="url(#shadow)"/>
<text x="1046.0" y="223.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="1046.0" dy="0">Start guided review</tspan></text>
<rect x="956" y="295" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#9A7BFF" stroke-width="2" filter="url(#shadow)"/>
<text x="1046.0" y="333.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="1046.0" dy="0">Answer each station</tspan></text>
<rect x="956" y="405" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#9A7BFF" stroke-width="2" filter="url(#shadow)"/>
<text x="1046.0" y="443.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="1046.0" dy="0">Reveal feedback</tspan></text>

  <rect x="1213" y="120" width="250" height="500" rx="20" fill="#FFF2E5" stroke="#F6AE5D" stroke-width="2"/>
  <rect x="1235" y="102" width="130" height="36" rx="14" fill="#FFFFFF" stroke="#F6AE5D" stroke-width="2"/>
  <text x="1300.0" y="125" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154">5. Progress</text>
<rect x="1248" y="185" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#F6AE5D" stroke-width="2" filter="url(#shadow)"/>
<text x="1338.0" y="223.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="1338.0" dy="0">Earn XP</tspan></text>
<rect x="1248" y="295" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#F6AE5D" stroke-width="2" filter="url(#shadow)"/>
<text x="1338.0" y="333.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="1338.0" dy="0">Unlock achievements</tspan></text>
<rect x="1248" y="405" width="180" height="76" rx="14" fill="#FFFFFF" stroke="#F6AE5D" stroke-width="2" filter="url(#shadow)"/>
<text x="1338.0" y="443.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="1338.0" dy="0">Track streaks</tspan></text>
<line x1="295.0" y1="370" x2="337.0" y2="370" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="587.0" y1="370" x2="629.0" y2="370" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="879.0" y1="370" x2="921.0" y2="370" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="1171.0" y1="370" x2="1213.0" y2="370" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="180" y="655" width="1140" height="52" rx="14" fill="#F8FAFC" stroke="#D7E0EA" stroke-width="1.5"/>
<text x="750.0" y="683" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" fill="#607086"><tspan x="750.0" dy="0">Outcome: a child transforms information into a memorable spatial route and reinforces it through repeated guided walks.</tspan></text>
</svg>
