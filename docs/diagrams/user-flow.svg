<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="640" viewBox="0 0 1800 640" role="img" aria-label="Core User Flow">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#4D96FF" />
  </marker>
  <style>
    .title { font: 700 26px Arial, Helvetica, sans-serif; fill: #2D3436; }
    .panel-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #2D3436; }
    .box-text { font: 600 15px Arial, Helvetica, sans-serif; fill: #2D3436; }
    .small-text { font: 600 13px Arial, Helvetica, sans-serif; fill: #586267; }
    .edge-label { font: 600 12px Arial, Helvetica, sans-serif; fill: #586267; }
    .arrow { fill: none; stroke: #4D96FF; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
    .arrow-soft { fill: none; stroke: #4D96FF; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); stroke-dasharray: 8 6; }
    .relation { fill: none; stroke: #4D96FF; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</defs>
<rect x="0" y="0" width="1800" height="640" fill="#FFFFFF"/>
<text x="32" y="42" class="title" text-anchor="start">Core User Flow</text>
<rect x="50" y="90" width="390" height="440" rx="24" fill="#FFFFFF" stroke="#FFD93D" stroke-width="3"/>
<text x="74" y="122" class="panel-title" text-anchor="start">First use</text>
<rect x="145" y="150" width="200" height="62" rx="18" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2.5"/>
<text x="245.0" y="186.0" class="box-text" text-anchor="middle">
<tspan x="245.0" dy="0">Open app</tspan>
</text>
<rect x="145" y="242" width="200" height="62" rx="18" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2.5"/>
<text x="245.0" y="269.0" class="box-text" text-anchor="middle">
<tspan x="245.0" dy="0">Complete</tspan>
<tspan x="245.0" dy="18">onboarding</tspan>
</text>
<path class="arrow" d="M 245 212 L 245 242"/>
<rect x="145" y="334" width="200" height="62" rx="18" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2.5"/>
<text x="245.0" y="361.0" class="box-text" text-anchor="middle">
<tspan x="245.0" dy="0">Register profile</tspan>
<tspan x="245.0" dy="18">Avatar + age</tspan>
</text>
<path class="arrow" d="M 245 304 L 245 334"/>
<rect x="485" y="90" width="390" height="440" rx="24" fill="#FFFFFF" stroke="#4D96FF" stroke-width="3"/>
<text x="509" y="122" class="panel-title" text-anchor="start">Build palace</text>
<rect x="580" y="150" width="200" height="62" rx="18" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2.5"/>
<text x="680.0" y="177.0" class="box-text" text-anchor="middle">
<tspan x="680.0" dy="0">Create palace</tspan>
<tspan x="680.0" dy="18">from template</tspan>
</text>
<rect x="580" y="242" width="200" height="62" rx="18" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2.5"/>
<text x="680.0" y="269.0" class="box-text" text-anchor="middle">
<tspan x="680.0" dy="0">Add memory</tspan>
<tspan x="680.0" dy="18">stations</tspan>
</text>
<path class="arrow" d="M 680 212 L 680 242"/>
<rect x="580" y="334" width="200" height="62" rx="18" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2.5"/>
<text x="680.0" y="361.0" class="box-text" text-anchor="middle">
<tspan x="680.0" dy="0">Attach optional</tspan>
<tspan x="680.0" dy="18">images</tspan>
</text>
<path class="arrow" d="M 680 304 L 680 334"/>
<rect x="580" y="426" width="200" height="62" rx="18" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2.5"/>
<text x="680.0" y="462.0" class="box-text" text-anchor="middle">
<tspan x="680.0" dy="0">Reorder route</tspan>
</text>
<path class="arrow" d="M 680 396 L 680 426"/>
<path class="arrow" d="M 345 365 L 505 365 L 505 181 L 580 181"/>
<rect x="920" y="90" width="390" height="440" rx="24" fill="#FFFFFF" stroke="#6BCB77" stroke-width="3"/>
<text x="944" y="122" class="panel-title" text-anchor="start">Practice memory</text>
<rect x="1015" y="150" width="200" height="62" rx="18" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2.5"/>
<text x="1115.0" y="177.0" class="box-text" text-anchor="middle">
<tspan x="1115.0" dy="0">Start guided</tspan>
<tspan x="1115.0" dy="18">review</tspan>
</text>
<rect x="1015" y="242" width="200" height="62" rx="18" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2.5"/>
<text x="1115.0" y="269.0" class="box-text" text-anchor="middle">
<tspan x="1115.0" dy="0">Walk through</tspan>
<tspan x="1115.0" dy="18">stations</tspan>
</text>
<path class="arrow" d="M 1115 212 L 1115 242"/>
<rect x="1015" y="334" width="200" height="62" rx="18" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2.5"/>
<text x="1115.0" y="370.0" class="box-text" text-anchor="middle">
<tspan x="1115.0" dy="0">Answer prompts</tspan>
</text>
<path class="arrow" d="M 1115 304 L 1115 334"/>
<rect x="1015" y="426" width="200" height="62" rx="18" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2.5"/>
<text x="1115.0" y="453.0" class="box-text" text-anchor="middle">
<tspan x="1115.0" dy="0">Receive</tspan>
<tspan x="1115.0" dy="18">feedback</tspan>
</text>
<path class="arrow" d="M 1115 396 L 1115 426"/>
<path class="arrow" d="M 780 457 L 940 457 L 940 181 L 1015 181"/>
<rect x="1355" y="90" width="390" height="440" rx="24" fill="#FFFFFF" stroke="#FF6B6B" stroke-width="3"/>
<text x="1379" y="122" class="panel-title" text-anchor="start">Progress</text>
<rect x="1450" y="150" width="200" height="62" rx="18" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="2.5"/>
<text x="1550.0" y="177.0" class="box-text" text-anchor="middle">
<tspan x="1550.0" dy="0">Earn XP +</tspan>
<tspan x="1550.0" dy="18">achievements</tspan>
</text>
<rect x="1450" y="242" width="200" height="62" rx="18" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="2.5"/>
<text x="1550.0" y="269.0" class="box-text" text-anchor="middle">
<tspan x="1550.0" dy="0">View progress</tspan>
<tspan x="1550.0" dy="18">dashboard</tspan>
</text>
<path class="arrow" d="M 1550 212 L 1550 242"/>
<rect x="1450" y="334" width="200" height="62" rx="18" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="2.5"/>
<text x="1550.0" y="361.0" class="box-text" text-anchor="middle">
<tspan x="1550.0" dy="0">Return and keep</tspan>
<tspan x="1550.0" dy="18">streak alive</tspan>
</text>
<path class="arrow" d="M 1550 304 L 1550 334"/>
<path class="arrow" d="M 1215 457 L 1375 457 L 1375 181 L 1450 181"/>
</svg>