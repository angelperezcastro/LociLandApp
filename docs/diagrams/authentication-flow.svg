<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
<title id="title">Authentication Flow</title>
<desc id="desc">Professional architecture diagram for the LociLand README.</desc>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M 1 1 L 11 6 L 1 11 z" fill="#48606A" />
  </marker>
  <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M 1 1 L 11 6 L 1 11 z" fill="#4D96FF" />
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#2D3436" flood-opacity="0.10"/>
  </filter>
</defs>
<rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
<text x="640.0" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2D3436">Authentication Flow</text>
<line x1="50" y1="58" x2="1230" y2="58" stroke="#E9DFC7" stroke-width="2" stroke-linecap="round"/>
<rect x="70" y="160" width="170" height="70" rx="16" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<text x="155.0" y="193.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#2D3436">
<tspan x="155.0" dy="0">App Mount</tspan>
</text>
<line x1="240" y1="195" x2="315" y2="195" stroke="#48606A" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="315" y="160" width="190" height="70" rx="16" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<text x="410.0" y="191" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#2D3436">
<tspan x="410.0" dy="0">RootNavigator</tspan>
</text>
<text x="410.0" y="216" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#586267">
<tspan x="410.0" dy="0">subscribes to auth state</tspan>
</text>
<line x1="505" y1="195" x2="585" y2="195" stroke="#4D96FF" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
<rect x="585" y="160" width="190" height="70" rx="16" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2" filter="url(#shadow)"/>
<text x="680.0" y="191" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#2D3436">
<tspan x="680.0" dy="0">Firebase Auth</tspan>
</text>
<text x="680.0" y="216" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#586267">
<tspan x="680.0" dy="0">user or null</tspan>
</text>
<polygon points="875,150 985,195 875,240 765,195" fill="#F8FAFC" stroke="#48606A" stroke-width="2" filter="url(#shadow)"/>
<text x="875" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#2D3436">
<tspan x="875" dy="0">Authenticated?</tspan>
</text>
<line x1="775" y1="195" x2="765" y2="195" stroke="#48606A" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<polyline points="875,240 875,325 330,325 330,410" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="610" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="610" dy="0">no</tspan>
</text>
<rect x="235" y="410" width="190" height="70" rx="16" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="2" filter="url(#shadow)"/>
<text x="330.0" y="443.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#2D3436">
<tspan x="330.0" dy="0">clearUser()</tspan>
</text>
<line x1="425" y1="445" x2="515" y2="445" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="515" y="410" width="210" height="70" rx="16" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="2" filter="url(#shadow)"/>
<text x="620.0" y="441" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#2D3436">
<tspan x="620.0" dy="0">Render AuthNavigator</tspan>
</text>
<text x="620.0" y="466" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#586267">
<tspan x="620.0" dy="0">Onboarding / Login / Register</tspan>
</text>
<line x1="985" y1="195" x2="1060" y2="195" stroke="#4D96FF" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
<text x="1025" y="178" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="1025" dy="0">yes</tspan>
</text>
<rect x="1060" y="160" width="180" height="70" rx="16" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2" filter="url(#shadow)"/>
<text x="1150.0" y="193.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2D3436">
<tspan x="1150.0" dy="0">hydrateFromAuthUser()</tspan>
</text>
<polyline points="1150,230 1150,305 905,305 905,380" fill="none" stroke="#4D96FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)"/>
<rect x="805" y="380" width="200" height="70" rx="16" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2" filter="url(#shadow)"/>
<text x="905.0" y="411" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#2D3436">
<tspan x="905.0" dy="0">Read profile</tspan>
</text>
<text x="905.0" y="436" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#586267">
<tspan x="905.0" dy="0">users/{uid}</tspan>
</text>
<line x1="905" y1="450" x2="905" y2="520" stroke="#6BCB77" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="805" y="520" width="200" height="70" rx="16" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2" filter="url(#shadow)"/>
<text x="905.0" y="551" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#2D3436">
<tspan x="905.0" dy="0">Create if missing</tspan>
</text>
<text x="905.0" y="576" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#586267">
<tspan x="905.0" dy="0">safe default profile</tspan>
</text>
<line x1="1005" y1="555" x2="1085" y2="555" stroke="#6BCB77" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="1085" y="520" width="170" height="70" rx="16" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2" filter="url(#shadow)"/>
<text x="1170.0" y="553.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#2D3436">
<tspan x="1170.0" dy="0">Render AppNavigator</tspan>
</text>
<rect x="70" y="585" width="640" height="70" rx="18" fill="#FFFFFF" stroke="#E9DFC7" stroke-width="2"/>
<text x="390" y="612" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#586267">
<tspan x="390" dy="0">The user profile service only writes safe profile fields. XP, level and streak are</tspan>
<tspan x="390" dy="18">guarded by domain services and Firebase rules.</tspan>
</text>
</svg>