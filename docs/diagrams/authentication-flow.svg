<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-label="Authentication Flow">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#4D96FF" />
  </marker>
  <style>
    .title { font: 700 26px Arial, Helvetica, sans-serif; fill: #2D3436; }
    .panel-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #2D3436; }
    .box-text { font: 600 15px Arial, Helvetica, sans-serif; fill: #2D3436; }
    .small-text { font: 600 13px Arial, Helvetica, sans-serif; fill: #586267; }
    .edge-label { font: 600 12px Arial, Helvetica, sans-serif; fill: #586267; }
    .arrow { fill: none; stroke: #4D96FF; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
    .arrow-soft { fill: none; stroke: #4D96FF; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); stroke-dasharray: 8 6; }
    .relation { fill: none; stroke: #4D96FF; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</defs>
<rect x="0" y="0" width="1600" height="820" fill="#FFFFFF"/>
<text x="32" y="42" class="title" text-anchor="start">Authentication Flow</text>
<rect x="60" y="350" width="140" height="60" rx="18" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2.5"/>
<text x="130.0" y="385.0" class="box-text" text-anchor="middle">
<tspan x="130.0" dy="0">App mounts</tspan>
</text>
<rect x="250" y="350" width="170" height="60" rx="18" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2.5"/>
<text x="335.0" y="376.0" class="box-text" text-anchor="middle">
<tspan x="335.0" dy="0">RootNavigator</tspan>
<tspan x="335.0" dy="18">subscribes</tspan>
</text>
<rect x="480" y="350" width="170" height="60" rx="18" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2.5"/>
<text x="565.0" y="376.0" class="box-text" text-anchor="middle">
<tspan x="565.0" dy="0">Firebase Auth</tspan>
<tspan x="565.0" dy="18">state change</tspan>
</text>
<polygon points="730,335.0 792.5,380 730,425.0 667.5,380" fill="#FFF1C2" stroke="#FFB703" stroke-width="2.5"/>
<text x="730.0" y="385.0" class="box-text" text-anchor="middle">
<tspan x="730.0" dy="0">User?</tspan>
</text>
<path class="arrow" d="M 200 380 L 250 380"/>
<path class="arrow" d="M 420 380 L 480 380"/>
<path class="arrow" d="M 650 380 L 667 380"/>
<rect x="850" y="515" width="150" height="58" rx="18" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="2.5"/>
<text x="925.0" y="549.0" class="box-text" text-anchor="middle">
<tspan x="925.0" dy="0">clearUser()</tspan>
</text>
<rect x="1070" y="515" width="190" height="58" rx="18" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="2.5"/>
<text x="1165.0" y="540.0" class="box-text" text-anchor="middle">
<tspan x="1165.0" dy="0">Render</tspan>
<tspan x="1165.0" dy="18">AuthNavigator</tspan>
</text>
<path class="arrow" d="M 793 410 L 815 410 L 815 544 L 850 544"/>
<text x="818.25" y="469.0" class="edge-label" text-anchor="middle">No</text>
<path class="arrow" d="M 1000 544 L 1070 544"/>
<rect x="850" y="240" width="190" height="58" rx="18" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2.5"/>
<text x="945.0" y="274.0" class="box-text" text-anchor="middle">
<tspan x="945.0" dy="0">hydrateFromAuthUser()</tspan>
</text>
<rect x="1100" y="240" width="180" height="58" rx="18" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2.5"/>
<text x="1190.0" y="265.0" class="box-text" text-anchor="middle">
<tspan x="1190.0" dy="0">Read</tspan>
<tspan x="1190.0" dy="18">users/{uid}</tspan>
</text>
<polygon points="1370,224.0 1437.5,269 1370,314.0 1302.5,269" fill="#FFF1C2" stroke="#FFB703" stroke-width="2.5"/>
<text x="1370.0" y="265.0" class="box-text" text-anchor="middle">
<tspan x="1370.0" dy="0">Profile</tspan>
<tspan x="1370.0" dy="18">exists?</tspan>
</text>
<path class="arrow" d="M 793 350 L 815 350 L 815 269 L 850 269"/>
<text x="818.25" y="301.5" class="edge-label" text-anchor="middle">Yes</text>
<path class="arrow" d="M 1040 269 L 1100 269"/>
<path class="arrow" d="M 1280 269 L 1302 269"/>
<rect x="1180" y="390" width="200" height="58" rx="18" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2.5"/>
<text x="1280.0" y="415.0" class="box-text" text-anchor="middle">
<tspan x="1280.0" dy="0">Create safe</tspan>
<tspan x="1280.0" dy="18">default profile</tspan>
</text>
<rect x="1410" y="390" width="155" height="58" rx="18" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2.5"/>
<text x="1487.5" y="415.0" class="box-text" text-anchor="middle">
<tspan x="1487.5" dy="0">Set Zustand</tspan>
<tspan x="1487.5" dy="18">profile</tspan>
</text>
<rect x="1410" y="515" width="155" height="58" rx="18" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2.5"/>
<text x="1487.5" y="540.0" class="box-text" text-anchor="middle">
<tspan x="1487.5" dy="0">Render</tspan>
<tspan x="1487.5" dy="18">AppNavigator</tspan>
</text>
<path class="arrow" d="M 1438 269 L 1470 269 L 1470 390"/>
<text x="1459.3333333333333" y="301.3333333333333" class="edge-label" text-anchor="middle">Yes</text>
<path class="arrow" d="M 1370 314 L 1370 360 L 1280 360 L 1280 390"/>
<text x="1325.0" y="348.0" class="edge-label" text-anchor="middle">No</text>
<path class="arrow" d="M 1380 419 L 1410 419"/>
<path class="arrow" d="M 1488 448 L 1488 515"/>
</svg>