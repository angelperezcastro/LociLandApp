<text x="1125.0" y="774" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" fill="#607086"><tspan x="1125.0" dy="0">authenticated app shell</tspan></text>
<path d="M 900 156 L 1010 156" fill="none" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)" stroke-linejoin="round" stroke-linecap="round"/>
<text x="955.0" y="148.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#607086">yes</text>
