<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Authentication Flow">
<rect width="1280" height="720" fill="#FFFFFF"/>

<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#2D3436" flood-opacity="0.10"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#4D96FF" />
  </marker>
  <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#6BCB77" />
  </marker>
  <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#FF6B6B" />
  </marker>
</defs>


<style>
  .title { font-family: Inter, Nunito, Arial, sans-serif; font-size: 30px; font-weight: 800; fill: #2D3436; }
  .subtitle { font-family: Inter, Nunito, Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #586267; }
  .group-title { font-family: Inter, Nunito, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #2D3436; }
  .box-title { font-family: Inter, Nunito, Arial, sans-serif; font-size: 15px; font-weight: 800; fill: #2D3436; }
  .box-text { font-family: Inter, Nunito, Arial, sans-serif; font-size: 12px; font-weight: 600; fill: #586267; }
  .small { font-family: Inter, Nunito, Arial, sans-serif; font-size: 11px; font-weight: 600; fill: #586267; }
  .tiny { font-family: Inter, Nunito, Arial, sans-serif; font-size: 10px; font-weight: 600; fill: #586267; }
  .arrow { stroke: #4D96FF; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  .arrow-green { stroke: #6BCB77; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
  .arrow-red { stroke: #FF6B6B; stroke-width: 2.4; fill: none; marker-end: url(#arrowRed); }
  .dash { stroke-dasharray: 7 5; }
</style>

<rect x="12" y="12" width="1256" height="696" rx="28" fill="#FFFFFF" stroke="#E9DFC7" stroke-width="2"/>
<text x="42" y="58" class="title">Authentication Flow</text>
<text x="42" y="85" class="subtitle">Firebase Auth drives route selection and Firestore profile hydration</text>
<rect x="30" y="125" width="140" height="52" rx="10" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<text x="100.0" y="152" text-anchor="middle" class="small">App</text>
<line x1="100" y1="177" x2="100" y2="640" stroke="#E9DFC7" stroke-width="2"/>
<rect x="210" y="125" width="140" height="52" rx="10" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<text x="280.0" y="152" text-anchor="middle" class="small">RootNavigator</text>
<line x1="280" y1="177" x2="280" y2="640" stroke="#E9DFC7" stroke-width="2"/>
<rect x="430" y="125" width="140" height="52" rx="10" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2" filter="url(#shadow)"/>
<text x="500.0" y="152" text-anchor="middle" class="small">Firebase Auth</text>
<line x1="500" y1="177" x2="500" y2="640" stroke="#E9DFC7" stroke-width="2"/>
<rect x="650" y="125" width="140" height="52" rx="10" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2" filter="url(#shadow)"/>
<text x="720.0" y="152" text-anchor="middle" class="small">useUserStore</text>
<line x1="720" y1="177" x2="720" y2="640" stroke="#E9DFC7" stroke-width="2"/>
<rect x="870" y="125" width="140" height="52" rx="10" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2" filter="url(#shadow)"/>
<text x="940.0" y="152" text-anchor="middle" class="small">userProfile</text>
<text x="940.0" y="169" text-anchor="middle" class="small">service</text>
<line x1="940" y1="177" x2="940" y2="640" stroke="#E9DFC7" stroke-width="2"/>
<rect x="1070" y="125" width="140" height="52" rx="10" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2" filter="url(#shadow)"/>
<text x="1140.0" y="152" text-anchor="middle" class="small">Firestore</text>
<line x1="1140" y1="177" x2="1140" y2="640" stroke="#E9DFC7" stroke-width="2"/>
<line x1="100" y1="230" x2="280" y2="230" class="arrow"/>
<text x="190.0" y="220" text-anchor="middle" class="tiny">Mount navigation tree</text>
<line x1="280" y1="290" x2="500" y2="290" class="arrow"/>
<text x="390.0" y="280" text-anchor="middle" class="tiny">Subscribe to auth state</text>
<line x1="500" y1="350" x2="280" y2="350" class="arrow-green dash"/>
<text x="390.0" y="340" text-anchor="middle" class="tiny">Return user or null</text>
<line x1="280" y1="420" x2="720" y2="420" class="arrow"/>
<text x="500.0" y="410" text-anchor="middle" class="tiny">clearUser() or hydrateFromAuthUser(user)</text>
<line x1="720" y1="485" x2="940" y2="485" class="arrow"/>
<text x="830.0" y="475" text-anchor="middle" class="tiny">getUserProfile(uid)</text>
<line x1="940" y1="545" x2="1140" y2="545" class="arrow"/>
<text x="1040.0" y="535" text-anchor="middle" class="tiny">Read / create users/{uid}</text>
<line x1="1140" y1="605" x2="720" y2="605" class="arrow-green dash"/>
<text x="930.0" y="595" text-anchor="middle" class="tiny">Return UserProfile</text>
<rect x="70" y="378" width="1140" height="92" rx="18" fill="#FFFFFF" stroke="#FF6B6B" stroke-width="2" stroke-dasharray="7 5"/>
<text x="94" y="405" class="box-title">Route decision</text><text x="94" y="430" class="small">No authenticated user → AuthNavigator · Authenticated user → AppNavigator after profile hydration</text>
</svg>