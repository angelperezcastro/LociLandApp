<text x="1125.0" y="489.5" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#607086">yes</text>
<line x1="1125" y1="632" x2="1125" y2="720" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="140" y="820" width="1220" height="42" rx="14" fill="#F8FAFC" stroke="#D7E0EA" stroke-width="1.5"/>
<text x="750.0" y="848" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" fill="#607086"><tspan x="750.0" dy="0">The user profile stores display name, email, avatar emoji, age group, XP, level and streak fields. Access is guarded by Firebase Auth and Firestore rules.</tspan></text>
