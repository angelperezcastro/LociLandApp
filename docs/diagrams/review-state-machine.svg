<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680" role="img" aria-label="Review State Machine">
<rect width="1180" height="680" fill="#FFFFFF"/>

<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#2D3436" flood-opacity="0.10"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#4D96FF" />
  </marker>
  <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#6BCB77" />
  </marker>
  <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#FF6B6B" />
  </marker>
</defs>


<style>
  .title { font-family: Inter, Nunito, Arial, sans-serif; font-size: 30px; font-weight: 800; fill: #2D3436; }
  .subtitle { font-family: Inter, Nunito, Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #586267; }
  .group-title { font-family: Inter, Nunito, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #2D3436; }
  .box-title { font-family: Inter, Nunito, Arial, sans-serif; font-size: 15px; font-weight: 800; fill: #2D3436; }
  .box-text { font-family: Inter, Nunito, Arial, sans-serif; font-size: 12px; font-weight: 600; fill: #586267; }
  .small { font-family: Inter, Nunito, Arial, sans-serif; font-size: 11px; font-weight: 600; fill: #586267; }
  .tiny { font-family: Inter, Nunito, Arial, sans-serif; font-size: 10px; font-weight: 600; fill: #586267; }
  .arrow { stroke: #4D96FF; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  .arrow-green { stroke: #6BCB77; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
  .arrow-red { stroke: #FF6B6B; stroke-width: 2.4; fill: none; marker-end: url(#arrowRed); }
  .dash { stroke-dasharray: 7 5; }
</style>

<rect x="12" y="12" width="1156" height="656" rx="28" fill="#FFFFFF" stroke="#E9DFC7" stroke-width="2"/>
<text x="42" y="58" class="title">Review State Machine</text>
<text x="42" y="85" class="subtitle">The memory practice loop is a guided walk, not a flat quiz</text>
<rect x="90" y="290" width="150" height="74" rx="20" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<text x="165.0" y="317" text-anchor="middle" class="box-title">INTRO</text>
<text x="165.0" y="336" text-anchor="middle" class="box-text">Prepare journey</text>
<rect x="300" y="290" width="150" height="74" rx="20" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2" filter="url(#shadow)"/>
<text x="375.0" y="317" text-anchor="middle" class="box-title">WALKING</text>
<text x="375.0" y="324" text-anchor="middle" class="box-text">Show current</text>
<text x="375.0" y="339" text-anchor="middle" class="box-text">station</text>
<rect x="520" y="290" width="150" height="74" rx="20" fill="#FFF1C2" stroke="#FFB703" stroke-width="2" filter="url(#shadow)"/>
<text x="595.0" y="317" text-anchor="middle" class="box-title">QUESTION</text>
<text x="595.0" y="336" text-anchor="middle" class="box-text">Recall prompt</text>
<rect x="740" y="290" width="150" height="74" rx="20" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2" filter="url(#shadow)"/>
<text x="815.0" y="317" text-anchor="middle" class="box-title">REVEAL</text>
<text x="815.0" y="336" text-anchor="middle" class="box-text">Feedback + answer</text>
<rect x="960" y="290" width="150" height="74" rx="20" fill="#F1E8FF" stroke="#7F5AD8" stroke-width="2" filter="url(#shadow)"/>
<text x="1035.0" y="317" text-anchor="middle" class="box-title">COMPLETE</text>
<text x="1035.0" y="336" text-anchor="middle" class="box-text">Summary + rewards</text>
<line x1="240" y1="327" x2="300" y2="327" class="arrow"/>
<line x1="450" y1="327" x2="520" y2="327" class="arrow"/>
<line x1="670" y1="327" x2="740" y2="327" class="arrow-green"/>
<line x1="890" y1="327" x2="960" y2="327" class="arrow-green"/>
<path d="M1035,364 C600.0,364 600.0,364 165,364" class="arrow-green dash"/>
<text x="585" y="430" text-anchor="middle" class="small">Review again</text>
<rect x="450" y="120" width="280" height="92" rx="18" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="2" filter="url(#shadow)"/>
<text x="590.0" y="147" text-anchor="middle" class="box-title">Age-specific interaction</text>
<text x="590.0" y="172" text-anchor="middle" class="box-text">6–9: multiple choice + larger</text>
<text x="590.0" y="187" text-anchor="middle" class="box-text">targets 10–14: free text + timer</text>
<line x1="590" y1="212" x2="595" y2="290" class="arrow-red"/>
<rect x="450" y="500" width="280" height="82" rx="18" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2" filter="url(#shadow)"/>
<text x="590.0" y="527" text-anchor="middle" class="box-title">Positive learning feedback</text>
<text x="590.0" y="542" text-anchor="middle" class="box-text">Correct: celebration Incorrect:</text>
<text x="590.0" y="557" text-anchor="middle" class="box-text">encouraging reveal</text>
<path d="M590,500 C702.5,500 702.5,364 815,364" class="arrow-green"/>
<text x="90" y="600" class="small">XP and achievements are applied only after a completed review session.</text>
</svg>