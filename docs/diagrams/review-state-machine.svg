<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="650" viewBox="0 0 1450 650" role="img" aria-label="Review State Machine">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#4C617A" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#12253f" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <text x="725.0" y="48" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#203040">Review State Machine</text>
<rect x="130" y="180" width="170" height="86" rx="14" fill="#FFFFFF" stroke="#E9C351" stroke-width="2" filter="url(#shadow)"/>
<text x="215.0" y="208" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="215.0" dy="0">Intro</tspan></text>
<text x="215.0" y="248" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" fill="#607086"><tspan x="215.0" dy="0">Prepare the journey</tspan></text>
<rect x="390" y="180" width="170" height="86" rx="14" fill="#FFFFFF" stroke="#6AA5FF" stroke-width="2" filter="url(#shadow)"/>
<text x="475.0" y="208" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="475.0" dy="0">Walking</tspan></text>
<text x="475.0" y="248" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" fill="#607086"><tspan x="475.0" dy="0">Arrive at station</tspan></text>
<rect x="650" y="180" width="170" height="86" rx="14" fill="#FFFFFF" stroke="#9A7BFF" stroke-width="2" filter="url(#shadow)"/>
<text x="735.0" y="208" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="735.0" dy="0">Question</tspan></text>
<text x="735.0" y="248" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" fill="#607086"><tspan x="735.0" dy="0">Recall the memory item</tspan></text>
<rect x="910" y="180" width="170" height="86" rx="14" fill="#FFFFFF" stroke="#68B984" stroke-width="2" filter="url(#shadow)"/>
<text x="995.0" y="208" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="995.0" dy="0">Reveal</tspan></text>
<text x="995.0" y="248" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" fill="#607086"><tspan x="995.0" dy="0">Correct / reveal feedback</tspan></text>
<rect x="1170" y="180" width="170" height="86" rx="14" fill="#FFFFFF" stroke="#F6AE5D" stroke-width="2" filter="url(#shadow)"/>
<text x="1255.0" y="208" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#324154"><tspan x="1255.0" dy="0">Complete</tspan></text>
<text x="1255.0" y="248" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="500" fill="#607086"><tspan x="1255.0" dy="0">Score, XP and celebration</tspan></text>
<line x1="300" y1="223" x2="390" y2="223" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="560" y1="223" x2="650" y2="223" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="820" y1="223" x2="910" y2="223" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="1080" y1="223" x2="1170" y2="223" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)"/>
<path d="M 995 266 L 995 330 L 475 330 L 475 266" fill="none" stroke="#4C617A" stroke-width="2.5" marker-end="url(#arrow)" stroke-linejoin="round" stroke-linecap="round"/>
<text x="735.0" y="322.0" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#607086">next station</text>
<rect x="240" y="440" width="970" height="92" rx="14" fill="#F8FAFC" stroke="#D7E0EA" stroke-width="1.5"/>
<text x="725.0" y="468" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="500" fill="#607086"><tspan x="725.0" dy="0">Age-group behaviour</tspan><tspan x="725.0" dy="17">6–9 years: multiple-choice answers with larger touch targets.</tspan><tspan x="725.0" dy="17">10–14 years: free-text input plus a visible review timer.</tspan></text>
</svg>
