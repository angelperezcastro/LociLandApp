<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="700" viewBox="0 0 1320 700" role="img" aria-labelledby="title desc">
<title id="title">Review State Machine</title>
<desc id="desc">Professional architecture diagram for the LociLand README.</desc>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M 1 1 L 11 6 L 1 11 z" fill="#48606A" />
  </marker>
  <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M 1 1 L 11 6 L 1 11 z" fill="#4D96FF" />
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#2D3436" flood-opacity="0.10"/>
  </filter>
</defs>
<rect x="0" y="0" width="1320" height="700" fill="#FFFFFF"/>
<text x="660.0" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2D3436">Review State Machine</text>
<line x1="50" y1="58" x2="1270" y2="58" stroke="#E9DFC7" stroke-width="2" stroke-linecap="round"/>
<rect x="80" y="210" width="190" height="96" rx="16" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<rect x="80" y="210" width="8" height="96" rx="16" fill="#FFD93D" stroke="#FFD93D" stroke-width="0"/>
<text x="175.0" y="241" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#2D3436">
<tspan x="175.0" dy="0">Intro</tspan>
</text>
<text x="175.0" y="266" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="175.0" dy="0">Prepare palace journey</tspan>
</text>
<rect x="320" y="210" width="190" height="96" rx="16" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2" filter="url(#shadow)"/>
<rect x="320" y="210" width="8" height="96" rx="16" fill="#4D96FF" stroke="#4D96FF" stroke-width="0"/>
<text x="415.0" y="241" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#2D3436">
<tspan x="415.0" dy="0">Walking</tspan>
</text>
<text x="415.0" y="266" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="415.0" dy="0">Show current station</tspan>
</text>
<rect x="560" y="210" width="190" height="96" rx="16" fill="#ECE3FF" stroke="#7F5AD8" stroke-width="2" filter="url(#shadow)"/>
<rect x="560" y="210" width="8" height="96" rx="16" fill="#7F5AD8" stroke="#7F5AD8" stroke-width="0"/>
<text x="655.0" y="241" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#2D3436">
<tspan x="655.0" dy="0">Question</tspan>
</text>
<text x="655.0" y="266" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="655.0" dy="0">Recall the memory item</tspan>
</text>
<rect x="800" y="210" width="190" height="96" rx="16" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2" filter="url(#shadow)"/>
<rect x="800" y="210" width="8" height="96" rx="16" fill="#6BCB77" stroke="#6BCB77" stroke-width="0"/>
<text x="895.0" y="241" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#2D3436">
<tspan x="895.0" dy="0">Reveal</tspan>
</text>
<text x="895.0" y="266" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="895.0" dy="0">Correct / almost feedback</tspan>
</text>
<rect x="1040" y="210" width="190" height="96" rx="16" fill="#FFF1C2" stroke="#FFB703" stroke-width="2" filter="url(#shadow)"/>
<rect x="1040" y="210" width="8" height="96" rx="16" fill="#FFB703" stroke="#FFB703" stroke-width="0"/>
<text x="1135.0" y="241" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#2D3436">
<tspan x="1135.0" dy="0">Complete</tspan>
</text>
<text x="1135.0" y="266" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="1135.0" dy="0">Score, XP and celebration</tspan>
</text>
<line x1="270" y1="258" x2="320" y2="258" stroke="#48606A" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="510" y1="258" x2="560" y2="258" stroke="#48606A" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="750" y1="258" x2="800" y2="258" stroke="#48606A" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="990" y1="258" x2="1040" y2="258" stroke="#48606A" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="415" y="245" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="415" dy="0">Start journey</tspan>
</text>
<text x="657" y="245" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="657" dy="0">I remember</tspan>
</text>
<text x="895" y="245" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="895" dy="0">Submit / give up</tspan>
</text>
<text x="1020" y="245" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#586267">
<tspan x="1020" dy="0">Last station?</tspan>
</text>
<polyline points="895,306 895,405 415,405 415,306" fill="none" stroke="#4D96FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-blue)"/>
<text x="655" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#586267">
<tspan x="655" dy="0">Next station</tspan>
</text>
<rect x="220" y="500" width="880" height="120" rx="24" fill="#FFFFFF" stroke="#E9DFC7" stroke-width="2" filter="url(#shadow)"/>
<text x="660" y="532" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#2D3436">Age-specific question behaviour</text>
<rect x="300" y="555" width="300" height="44" rx="16" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<text x="450.0" y="575.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2D3436">
<tspan x="450.0" dy="0">6-9 years: multiple choice + larger</tspan>
<tspan x="450.0" dy="18">touch targets</tspan>
</text>
<rect x="720" y="555" width="300" height="44" rx="16" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2" filter="url(#shadow)"/>
<text x="870.0" y="575.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2D3436">
<tspan x="870.0" dy="0">10-14 years: free text input + timer</tspan>
</text>
</svg>