<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720" role="img" aria-label="Review State Machine">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#4D96FF" />
  </marker>
  <style>
    .title { font: 700 26px Arial, Helvetica, sans-serif; fill: #2D3436; }
    .panel-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #2D3436; }
    .box-text { font: 600 15px Arial, Helvetica, sans-serif; fill: #2D3436; }
    .small-text { font: 600 13px Arial, Helvetica, sans-serif; fill: #586267; }
    .edge-label { font: 600 12px Arial, Helvetica, sans-serif; fill: #586267; }
    .arrow { fill: none; stroke: #4D96FF; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
    .arrow-soft { fill: none; stroke: #4D96FF; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); stroke-dasharray: 8 6; }
    .relation { fill: none; stroke: #4D96FF; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</defs>
<rect x="0" y="0" width="1500" height="720" fill="#FFFFFF"/>
<text x="32" y="42" class="title" text-anchor="start">Review State Machine</text>
<rect x="80" y="250" width="180" height="70" rx="18" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2.5"/>
<text x="170.0" y="281.0" class="box-text" text-anchor="middle">
<tspan x="170.0" dy="0">Intro</tspan>
<tspan x="170.0" dy="18">Prepare journey</tspan>
</text>
<rect x="340" y="250" width="180" height="70" rx="18" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2.5"/>
<text x="430.0" y="281.0" class="box-text" text-anchor="middle">
<tspan x="430.0" dy="0">Walking</tspan>
<tspan x="430.0" dy="18">Current station</tspan>
</text>
<rect x="600" y="250" width="180" height="70" rx="18" fill="#FFF1C2" stroke="#FFB703" stroke-width="2.5"/>
<text x="690.0" y="281.0" class="box-text" text-anchor="middle">
<tspan x="690.0" dy="0">Question</tspan>
<tspan x="690.0" dy="18">Recall prompt</tspan>
</text>
<rect x="860" y="250" width="180" height="70" rx="18" fill="#DDF8E1" stroke="#6BCB77" stroke-width="2.5"/>
<text x="950.0" y="281.0" class="box-text" text-anchor="middle">
<tspan x="950.0" dy="0">Reveal</tspan>
<tspan x="950.0" dy="18">Feedback</tspan>
</text>
<rect x="1120" y="250" width="180" height="70" rx="18" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="2.5"/>
<text x="1210.0" y="281.0" class="box-text" text-anchor="middle">
<tspan x="1210.0" dy="0">Complete</tspan>
<tspan x="1210.0" dy="18">Summary + rewards</tspan>
</text>
<path class="arrow" d="M 260 285 L 340 285"/>
<path class="arrow" d="M 520 285 L 600 285"/>
<path class="arrow" d="M 780 285 L 860 285"/>
<path class="arrow" d="M 1040 285 L 1120 285"/>
<text x="295" y="270" class="edge-label" text-anchor="middle">Start</text>
<text x="555" y="270" class="edge-label" text-anchor="middle">I remember</text>
<text x="812" y="270" class="edge-label" text-anchor="middle">Submit / give up</text>
<text x="1075" y="270" class="edge-label" text-anchor="middle">Last station</text>
<path class="arrow" d="M 950 320 L 950 390 L 430 390 L 430 320"/>
<text x="690.0" y="347.0" class="edge-label" text-anchor="middle">Next station</text>
<path class="arrow-soft" d="M 1210 320 L 1210 480 L 170 480 L 170 320"/>
<text x="690.0" y="392.0" class="edge-label" text-anchor="middle">Review again</text>
<rect x="1120" y="500" width="180" height="60" rx="18" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2.5"/>
<text x="1210.0" y="526.0" class="box-text" text-anchor="middle">
<tspan x="1210.0" dy="0">Palace Detail</tspan>
<tspan x="1210.0" dy="18">Exit flow</tspan>
</text>
<path class="arrow" d="M 1210 320 L 1210 500"/>
<text x="1210.0" y="402.0" class="edge-label" text-anchor="middle">Back</text>
<rect x="510" y="500" width="205" height="68" rx="18" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2.5"/>
<text x="612.5" y="521.0" class="box-text" text-anchor="middle">
<tspan x="612.5" dy="0">6-9 mode</tspan>
<tspan x="612.5" dy="18">Multiple choice</tspan>
<tspan x="612.5" dy="18">Large touch targets</tspan>
</text>
<rect x="770" y="500" width="205" height="68" rx="18" fill="#DDEBFF" stroke="#4D96FF" stroke-width="2.5"/>
<text x="872.5" y="521.0" class="box-text" text-anchor="middle">
<tspan x="872.5" dy="0">10-14 mode</tspan>
<tspan x="872.5" dy="18">Free text</tspan>
<tspan x="872.5" dy="18">Review timer</tspan>
</text>
<path class="arrow-soft" d="M 612 500 L 650 450 L 690 320"/>
<text x="650.6666666666666" y="415.3333333333333" class="edge-label" text-anchor="middle">age mode</text>
<path class="arrow-soft" d="M 872 500 L 830 450 L 690 320"/>
</svg>