<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
<title id="title">High-Level Architecture</title>
<desc id="desc">Professional architecture diagram for the LociLand README.</desc>
<defs>
