<text x="895.0" y="590" text-anchor="middle" class="small">storage</text>
<rect x="1040" y="130" width="190" height="600" rx="24" fill="#FFFFFF" stroke="#FFB703" stroke-width="2.5"/>
<text x="1062" y="164" class="group-title">Foundation</text>
<rect x="1065" y="195" width="140" height="54" rx="10" fill="#FFF1C2" stroke="#FFB703" stroke-width="2" filter="url(#shadow)"/>
<text x="1135.0" y="222" text-anchor="middle" class="small">colors /</text>
<text x="1135.0" y="239" text-anchor="middle" class="small">typography</text>
