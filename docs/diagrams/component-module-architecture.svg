<text x="1135.0" y="314" text-anchor="middle" class="small">spacing / radius</text>
<text x="1135.0" y="331" text-anchor="middle" class="small">/ shadows</text>
<rect x="1065" y="379" width="140" height="54" rx="10" fill="#FFF1C2" stroke="#FFB703" stroke-width="2" filter="url(#shadow)"/>
<text x="1135.0" y="406" text-anchor="middle" class="small">world palettes /</text>
<text x="1135.0" y="423" text-anchor="middle" class="small">motion</text>
