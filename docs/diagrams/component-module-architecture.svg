<text x="165.0" y="222" text-anchor="middle" class="small">Onboarding</text>
<rect x="95" y="287" width="140" height="54" rx="10" fill="#FFF7DF" stroke="#FFD93D" stroke-width="2" filter="url(#shadow)"/>
<text x="165.0" y="314" text-anchor="middle" class="small">Auth</text>
