<text x="592" y="164" class="group-title">State</text>
<rect x="595" y="195" width="140" height="54" rx="10" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="2" filter="url(#shadow)"/>
<text x="665.0" y="222" text-anchor="middle" class="small">useUserStore</text>
<rect x="595" y="287" width="140" height="54" rx="10" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="2" filter="url(#shadow)"/>
<text x="665.0" y="314" text-anchor="middle" class="small">usePalaceStore</text>
<rect x="595" y="379" width="140" height="54" rx="10" fill="#FFE0E0" stroke="#FF6B6B" stroke-width="2" filter="url(#shadow)"/>
<text x="665.0" y="406" text-anchor="middle" class="small">Confetti /</text>
<text x="665.0" y="423" text-anchor="middle" class="small">LevelUp / Toast</text>
