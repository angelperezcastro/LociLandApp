<text x="1135.0" y="498" text-anchor="middle" class="small">validation</text>
<text x="1135.0" y="515" text-anchor="middle" class="small">constants</text>
<rect x="1065" y="563" width="140" height="54" rx="10" fill="#FFF1C2" stroke="#FFB703" stroke-width="2" filter="url(#shadow)"/>
<text x="1135.0" y="590" text-anchor="middle" class="small">domain types</text>
<line x1="260" y1="430" x2="310" y2="430" class="arrow"/>
<line x1="500" y1="430" x2="570" y2="430" class="arrow"/>
<line x1="760" y1="430" x2="800" y2="430" class="arrow-green"/>
<line x1="990" y1="430" x2="1040" y2="430" class="arrow-green"/>
<text x="70" y="770" class="small">Direction of dependency: feature screens → reusable components/state → domain services → theme, validation and types.</text>
</svg>